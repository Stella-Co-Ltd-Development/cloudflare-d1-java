name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test on Java ${{ matrix.java }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - java: "8"
            distribution: temurin
          - java: "11"
            distribution: temurin
          - java: "15"
            distribution: zulu
          - java: "17"
            distribution: temurin
          - java: "21"
            distribution: temurin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.distribution }}
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Test
        run: mvn -B clean verify

  release-profile:
    name: Verify release profile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify release artifacts
        run: mvn -B -Prelease -Dgpg.skip=true verify
