name: Bug report
description: Report a bug
title: "[Bug]: "
labels:
  - type: bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can this be reproduced?
      placeholder: |
        1. Create a client with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Library Version
      placeholder: "0.1.0"
    validations:
      required: false

  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: "17, 21, etc."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or Stack Trace
      description: Remove secrets, API tokens, private keys, account IDs, database IDs, customer data, and sensitive data before submitting.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues before opening this one.
          required: true
        - label: I removed secrets, API tokens, private keys, account IDs, database IDs, customer data, and sensitive data.
          required: true
